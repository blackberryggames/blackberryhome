<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Snake — Blackberrys</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e8e8f0;
    }
    h2 { font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 0.1em; color: #22c55e; }
    canvas {
      border: 2px solid #2a2a3e;
      border-radius: 8px;
      display: block;
    }
    .info {
      display: flex;
      gap: 40px;
      margin-top: 14px;
      font-size: 0.8rem;
      color: #6b6b8a;
    }
    .info span { color: #22c55e; }
    .over-msg {
      position: absolute;
      background: rgba(0,0,0,0.85);
      border: 1px solid #22c55e;
      border-radius: 12px;
      padding: 24px 40px;
      text-align: center;
      display: none;
    }
    .over-msg h3 { color: #22c55e; font-size: 1.6rem; margin-bottom: 8px; }
    .over-msg p { color: #6b6b8a; margin-bottom: 16px; }
    .over-msg button {
      background: #22c55e;
      color: #000;
      border: none;
      padding: 10px 28px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: bold;
    }
    .wrap { position: relative; }
  </style>
</head>
<body>
  <h2>🐍 SNAKE</h2>
  <div class="wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div class="over-msg" id="over">
      <h3>Game Over</h3>
      <p id="finalScore"></p>
      <button onclick="restart()">Play Again</button>
    </div>
  </div>
  <div class="info">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
    <div>Use arrow keys or WASD</div>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const SIZE = 20, W = 20, H = 20;
    let snake, dir, next, food, score, best = 0, alive, loop;

    function restart() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0}; next = {x:1,y:0};
      placeFood(); score = 0; alive = true;
      document.getElementById('over').style.display = 'none';
      document.getElementById('score').textContent = 0;
      clearInterval(loop);
      loop = setInterval(tick, 110);
    }

    function placeFood() {
      do { food = {x: Math.floor(Math.random()*W), y: Math.floor(Math.random()*H)}; }
      while (snake.some(s => s.x===food.x && s.y===food.y));
    }

    function tick() {
      dir = next;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)) {
        alive = false; clearInterval(loop);
        if (score > best) best = score;
        document.getElementById('best').textContent = best;
        document.getElementById('finalScore').textContent = `Score: ${score}`;
        document.getElementById('over').style.display = 'block';
        return;
      }
      snake.unshift(head);
      if (head.x===food.x&&head.y===food.y) {
        score++; document.getElementById('score').textContent = score; placeFood();
      } else snake.pop();
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,400,400);
      // Grid
      ctx.strokeStyle = '#12121a'; ctx.lineWidth = 0.5;
      for(let i=0;i<=W;i++){ctx.beginPath();ctx.moveTo(i*SIZE,0);ctx.lineTo(i*SIZE,400);ctx.stroke();}
      for(let j=0;j<=H;j++){ctx.beginPath();ctx.moveTo(0,j*SIZE);ctx.lineTo(400,j*SIZE);ctx.stroke();}
      // Food
      ctx.fillStyle = '#ef4444';
      ctx.beginPath();
      ctx.arc(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2, SIZE/2-2, 0, Math.PI*2);
      ctx.fill();
      // Snake
      snake.forEach((s,i) => {
        const g = ctx.createLinearGradient(s.x*SIZE, s.y*SIZE, s.x*SIZE+SIZE, s.y*SIZE+SIZE);
        g.addColorStop(0, i===0 ? '#4ade80' : '#22c55e');
        g.addColorStop(1, i===0 ? '#22c55e' : '#15803d');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.roundRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2, 4);
        ctx.fill();
      });
    }

    document.addEventListener('keydown', e => {
      const map = {
        ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
        ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
        w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0}
      };
      const n = map[e.key];
      if (n && !(n.x===-dir.x && n.y===-dir.y)) { next = n; e.preventDefault(); }
    });

    restart();
  </script>
</body>
</html>
